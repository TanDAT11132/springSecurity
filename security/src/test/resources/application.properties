spring.datasource.url=jdbc:h2:mem:securitydb;MODE=MSSQLServer;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.cache.type=simple
spring.task.scheduling.enabled=false

security.jwt.secret=test-secret-key-for-security-project-1234567890
security.jwt.expiration-minutes=120
security.cors.allowed-origin-patterns=*
security.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
security.cors.allowed-headers=*
security.cors.allow-credentials=false
security.rate-limit.auth.max-requests=50
security.rate-limit.auth.window-minutes=1
security.rate-limit.api.max-requests=500
security.rate-limit.api.window-minutes=1
book.cache.enabled=false
book.cache.redis-key=test:books:snapshot
book.cache.batch-size=50
book.cache.sync-interval-ms=300000
book.cache.initial-delay-ms=20000
app.pipeline.rabbit.exchange=test.large-data.exchange
app.pipeline.rabbit.routing-key=test.large-data.job
app.pipeline.rabbit.queue=test.large-data.job.queue
