spring.application.name=security
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=logindb;encrypt=false
spring.datasource.username=sa
spring.datasource.password=1111
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.SQLServerDialect
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.cache.type=redis
spring.cache.redis.time-to-live=10m
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672

security.jwt.secret=change-this-secret-key-for-production-please-1234567890
security.jwt.expiration-minutes=120
security.cors.allowed-origin-patterns=*
security.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
security.cors.allowed-headers=*
security.cors.allow-credentials=false
security.rate-limit.auth.max-requests=10
security.rate-limit.auth.window-minutes=1
security.rate-limit.api.max-requests=120
security.rate-limit.api.window-minutes=1
book.cache.enabled=true
book.cache.redis-key=books:snapshot
book.cache.batch-size=200
book.cache.sync-interval-ms=300000
book.cache.initial-delay-ms=20000
app.pipeline.rabbit.exchange=large-data.exchange
app.pipeline.rabbit.routing-key=large-data.job
app.pipeline.rabbit.queue=large-data.job.queue
